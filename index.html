<html lang="ko">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fff;display:flex;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
.phone{width:min(360px,100vw);background:#fff;display:flex;flex-direction:column;height:100vh;position:relative;overflow:hidden}
.page{position:absolute;inset:0;display:flex;flex-direction:column;transition:transform .35s cubic-bezier(.4,0,.2,1)}
.page.slide-left{transform:translateX(-100%)}
.page.slide-right{transform:translateX(100%)}

/* Action Bar */
.action-bar{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.action-bar-title{font-size:23px;font-weight:400;color:#111;letter-spacing:-1px;font-family:'Black Han Sans',sans-serif}

/* Scroll */
.scroll-body{overflow-y:auto;flex:1;scrollbar-width:none}
.scroll-body::-webkit-scrollbar{display:none}

/* Hero */
.hero{position:relative;height:224px;overflow:hidden;background:#ccc;flex-shrink:0}
.hero-track{display:flex;height:100%;transition:transform .45s cubic-bezier(.4,0,.2,1)}
.hero-slide{min-width:100%;height:100%;position:relative;flex-shrink:0}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.76) 0%,rgba(0,0,0,.1) 55%,transparent 100%)}
.hero-content{position:absolute;bottom:0;left:0;right:0;padding:18px 20px 20px}
.hero-cat{display:inline-block;font-size:10px;font-weight:500;color:rgba(255,255,255,.9);border:.5px solid rgba(255,255,255,.5);border-radius:20px;padding:3px 9px;margin-bottom:7px}
.hero-title{font-size:20px;color:#fff;font-weight:700;line-height:1.28;letter-spacing:-.4px;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.hero-sub{font-size:11.5px;color:rgba(255,255,255,.68);display:flex;align-items:center;gap:4px}
.hero-dots{display:flex;gap:5px;justify-content:center;padding:10px 0 4px;flex-shrink:0}
.dot{height:5px;border-radius:3px;background:#C8C8C4;cursor:pointer;transition:all .3s}
.dot.active{width:20px;background:#222}
.dot:not(.active){width:5px}

/* Filters */
.filters{padding:12px 18px 14px;display:flex;gap:6px;border-bottom:.5px solid #E2E2DD;position:relative;flex-shrink:0}
.filter-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:9px 0;border-radius:22px;border:.5px solid #D5D5D0;background:#fff;font-size:11px;font-weight:500;color:#333;cursor:pointer;white-space:nowrap}
.filter-btn.active{background:#222;border-color:#222;color:#fff}
.filter-btn .arr{transition:transform .2s}
.filter-btn.active .arr{transform:rotate(180deg)}
.filter-btn.active .arr path{fill:#fff}
.dropdown{display:none;position:absolute;top:calc(100% - 2px);background:#fff;border:.5px solid #E0E0DA;border-radius:16px;box-shadow:0 10px 32px rgba(0,0,0,.12);z-index:200;overflow-y:auto;max-height:260px;min-width:130px}
#dd-cat{left:18px}
#dd-reg{left:calc(18px + 25% + 4px)}
#dd-date{left:calc(18px + 50% + 8px)}
#dd-sort{right:18px}
.dropdown.show{display:block}
.dd-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;font-size:13px;color:#222;cursor:pointer;border-bottom:.5px solid #F2F2EE}
.dd-item:last-child{border-bottom:none}
.dd-item:hover{background:#F6F6F2}
.dd-item.sel{font-weight:700}
.dd-item.sel::after{content:'✓';font-size:11px;color:#555}

/* Section */
.section-header{padding:18px 20px 10px;display:flex;align-items:baseline;justify-content:space-between}
.section-title{font-size:15px;font-weight:700;color:#111;letter-spacing:-.3px}
.section-count{font-size:12px;color:#AAA}
.search-close{display:none;padding:0 16px 12px}
.search-close-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;border:.5px solid #D5D5D0;font-size:12px;font-weight:500;color:#555;cursor:pointer;background:#fff}

/* Cards */
.cards{padding:0 16px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.card{background:#fff;border-radius:16px;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;box-shadow:0 2px 10px rgba(0,0,0,.07);border:.5px solid rgba(0,0,0,.04);transition:transform .15s}
.card:active{transform:scale(.97)}
.card-thumb{width:100%;height:116px;position:relative;flex-shrink:0}
.card-thumb-inner{position:absolute;inset:0;background-size:cover;background-position:center}
.card-fav{position:absolute;top:8px;right:8px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2}
@keyframes favOut{0%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.2)}100%{opacity:0;transform:scale(0.5)}}
.fav-removing{animation:favOut .35s ease forwards}
.card-body{padding:20px 14px 16px;display:flex;flex-direction:column;align-items:flex-start;gap:4px}
.card-cat{font-size:10px;font-weight:500;color:#888;border:.5px solid #D5D5D0;border-radius:20px;padding:3px 9px}
.card-title{font-size:13px;font-weight:700;color:#111;line-height:1.32;letter-spacing:-.2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-venue{font-size:11px;color:#AAA;display:flex;align-items:center;gap:3px}
.card-venue i{font-size:11px;color:#CCC}
.card-date{font-size:11px;color:#BBB}
.load-more{margin:12px 16px 0;padding:14px;border-radius:14px;border:.5px solid #D5D5D0;font-size:13px;font-weight:600;color:#333;cursor:pointer;text-align:center;background:#fff}
.spacer{height:36px}
.state-box{padding:52px 0;text-align:center;color:#CCC;font-size:13px;display:flex;flex-direction:column;align-items:center;gap:14px;grid-column:1/-1}
.state-box i{font-size:38px}
.spinner{width:26px;height:26px;border:2.5px solid #E5E5DF;border-top-color:#888;border-radius:50%;animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Bottom Nav */
.bottom-nav{border-top:.5px solid #E2E2DD;padding:10px 0 20px;display:flex;justify-content:space-around;align-items:center;flex-shrink:0}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 16px;color:#BBB}
.nav-item.active{color:#111}
.nav-item i{font-size:22px}
.nav-item span{font-size:10px;font-weight:600}

/* Search Modal */
.modal{display:none;position:absolute;inset:0;z-index:300;align-items:center;justify-content:center;background:rgba(0,0,0,.45);backdrop-filter:blur(4px)}
.modal.show{display:flex}
.modal-box{background:#fff;border-radius:20px;width:calc(100% - 48px);padding:24px 20px 20px;display:flex;flex-direction:column;gap:14px}
.modal-title{font-size:15px;font-weight:700;color:#111}
.search-wrap{display:flex;align-items:center;gap:10px;border:.5px solid #D5D5D0;border-radius:12px;padding:11px 14px;background:#F8F8F6}
.search-inp{border:none;background:transparent;font-size:14px;color:#111;outline:none;flex:1;font-family:inherit}
.search-inp::placeholder{color:#BBB}
.search-x{font-size:16px;color:#CCC;cursor:pointer;display:none}
.search-x.show{display:block}
.modal-btns{display:flex;gap:8px}
.btn-cancel{flex:1;padding:13px;border-radius:12px;border:.5px solid #D5D5D0;background:#fff;font-size:13px;font-weight:600;color:#555;cursor:pointer;text-align:center}
.btn-confirm{flex:2;padding:13px;border-radius:12px;background:#111;font-size:13px;font-weight:600;color:#fff;cursor:pointer;text-align:center;border:none}

/* Detail */
.detail-hero{position:relative;height:260px;flex-shrink:0;overflow:hidden;background:#ccc}
.detail-hero-bg{position:absolute;inset:0;background-size:cover;background-position:center}
.detail-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,rgba(0,0,0,.1) 60%,transparent 100%)}
.back-btn{position:absolute;top:16px;left:16px;width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,.6);background:rgba(0,0,0,.2);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10}
.detail-hero-content{position:absolute;bottom:0;left:0;right:0;padding:20px}
.detail-cat{display:inline-block;font-size:10px;font-weight:500;color:rgba(255,255,255,.9);border:.5px solid rgba(255,255,255,.5);border-radius:20px;padding:3px 9px;margin-bottom:8px}
.detail-title{font-size:22px;color:#fff;font-weight:700;line-height:1.28;letter-spacing:-.5px}
.detail-scroll{overflow-y:auto;flex:1;scrollbar-width:none}
.detail-scroll::-webkit-scrollbar{display:none}
.detail-body{padding:24px 20px 40px;display:flex;flex-direction:column;gap:20px}
.info-row{display:flex;align-items:flex-start;gap:12px}
.info-icon{width:36px;height:36px;border-radius:10px;background:#F5F5F2;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.info-label{font-size:11px;color:#AAA;font-weight:500;margin-bottom:3px}
.info-value{font-size:13px;color:#111;font-weight:500;line-height:1.4}
.info-divider{height:.5px;background:#F0F0EC}
.ext-link{display:flex;align-items:center;justify-content:center;gap:6px;padding:14px;border-radius:14px;background:#111;color:#fff;font-size:14px;font-weight:600;text-decoration:none;margin-top:4px}
</style>
</head>

  {title:'어린이 미술 체험교실',cat:'교육',region:'강남구',venue:'코엑스 아티움',start:'2026.06.01',end:'2026.06.30',thumb:'',fee:'10,000원',target:'어린이',org:'코엑스',link:''},
  {title:'피카소와 친구들展',cat:'전시',region:'마포구',venue:'서울시립미술관 북서울관',start:'2026.05.15',end:'2026.08.15',thumb:'',fee:'5,000원',target:'전체',org:'서울시립미술관',link:''},
  {title:'강남 스트리트 아트위크',cat:'행사',region:'강남구',venue:'가로수길 일대',start:'2026.06.13',end:'2026.06.15',thumb:'',fee:'무료',target:'전체',org:'강남구',link:''}
];

var RAW=[], filtered=[], showN=10;
var F={cat:'전체',region:'전체',date:'전체',sort:'최신순',kw:''};
var hCur=0, hTimer=null, hLen=0;

function grad(cat){
  var p=PAL[cat]||PAL['기타'];
  return 'linear-gradient(135deg,'+p[0]+','+p[1]+')';
}

function mapCat(c){
  if(!c) return '기타';
  if(c.indexOf('전시')>-1||c.indexOf('미술')>-1||c.indexOf('사진')>-1||c.indexOf('조각')>-1||c.indexOf('공예')>-1||c.indexOf('디자인')>-1) return '전시';
  if(c.indexOf('공연')>-1||c.indexOf('뮤지컬')>-1||c.indexOf('연극')>-1||c.indexOf('클래식')>-1||c.indexOf('콘서트')>-1||c.indexOf('국악')>-1||c.indexOf('무용')>-1||c.indexOf('오페라')>-1||c.indexOf('음악')>-1||c.indexOf('발레')>-1||c.indexOf('재즈')>-1) return '공연';
  if(c.indexOf('교육')>-1||c.indexOf('체험')>-1||c.indexOf('강좌')>-1||c.indexOf('워크숍')>-1) return '교육';
  if(c.indexOf('행사')>-1||c.indexOf('축제')>-1||c.indexOf('이벤트')>-1||c.indexOf('영화')>-1) return '행사';
  return '기타';
}

function fmtDate(s,e){
  if(!s||!e) return '';
  var sa=s.split('.'), ea=e.split('.');
  return sa[0]===ea[0] ? sa[0]+'. '+sa[1]+'.'+sa[2]+' ~ '+ea[1]+'.'+ea[2] : s+' ~ '+e;
}

function init(){
  var isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.protocol === 'file:';
  var base = isLocal
    ? 'http://openapi.seoul.go.kr:8088/'+KEY+'/json/culturalEventInfo/'
    : '/api/'+KEY+'/json/culturalEventInfo/';
  var urls=[
    base+'1/1000/',
    base+'1001/2000/',
    base+'2001/3000/',
    base+'3001/4000/'
  ];
  Promise.all(urls.map(function(u){return fetch(u).then(function(r){return r.json();});}))
  .then(function(res){
    var rows=[];
    res.forEach(function(j){rows=rows.concat((j.culturalEventInfo||{}).row||[]);});
    if(rows.length){
      RAW=rows.map(function(d){
        return {
          title:d.TITLE||'',
          cat:mapCat(d.CODENAME),
          region:d.GUNAME||'',
          venue:(d.PLACE||'').trim(),
          start:(d.STRTDATE||'').slice(0,10).replace(/-/g,'.'),
          end:(d.END_DATE||'').slice(0,10).replace(/-/g,'.'),
          thumb:d.MAIN_IMG||'',
          fee:(d.USE_FEE||'').trim(),
          target:(d.USE_TRGT||'').trim(),
          org:(d.ORG_NAME||'').trim(),
          link:d.HMPG_ADDR||d.ORG_LINK||''
        };
      });
      buildReg();
    } else {
      RAW=FB;
    }
    render();
  })
  .catch(function(){RAW=FB;render();});
}

function buildReg(){
  var m={};
  RAW.forEach(function(d){if(d.region)m[d.region]=1;});
  var s=Object.keys(m).sort();
  var dd=document.getElementById('dd-reg');
  dd.innerHTML='<div class="dd-item sel" onclick="pick(\'dd-reg\',\'btn-reg\',\'지역\',\'전체\',this)">전체</div>'
    +s.map(function(r){return '<div class="dd-item" onclick="pick(\'dd-reg\',\'btn-reg\',\''+r+'\',\''+r+'\',this)">'+r+'</div>';}).join('');
}

function applyF(){
  var today=new Date();
  today.setHours(0,0,0,0);
  filtered=RAW.filter(function(d){
    if(F.cat!=='전체'&&d.cat!==F.cat) return false;
    if(F.region!=='전체'&&d.region!==F.region) return false;
    if(F.kw&&d.title.indexOf(F.kw)===-1&&d.venue.indexOf(F.kw)===-1) return false;
    if(d.end){
      var parts=d.end.split('.');
      var endDate=new Date(parts[0],parseInt(parts[1])-1,parseInt(parts[2]));
      if(endDate<today) return false;
    }
    return true;
  });
  if(F.sort==='시작일 임박순') filtered.sort(function(a,b){return a.start.localeCompare(b.start);});
  else if(F.sort==='종료일 임박순') filtered.sort(function(a,b){return a.end.localeCompare(b.end);});
}

function render(){
  showN=10;
  applyF();
  document.getElementById('secTitle').textContent=F.kw?'"'+F.kw+'" 검색 결과':'진행 중인 행사';
  document.getElementById('secCount').textContent=filtered.length?filtered.length+'개의 행사':'';
  document.getElementById('searchClose').style.display=F.kw?'block':'none';
  renderHero(filtered.slice(0,4));
  renderCards();
}

function renderHero(items){
  clearInterval(hTimer);
  hCur=0; hLen=items.length;
  var tr=document.getElementById('heroTrack');
  var dt=document.getElementById('heroDots');
  if(!hLen){tr.innerHTML='';dt.innerHTML='';return;}
  tr.innerHTML=items.map(function(d){
    var bg=d.thumb?"url('"+d.thumb+"') center/cover no-repeat":grad(d.cat);
    return '<div class="hero-slide"><div class="hero-bg" style="background:'+bg+'"></div><div class="hero-overlay"></div><div class="hero-content"><div class="hero-cat">'+d.cat+'</div><div class="hero-title">'+d.title+'</div><div class="hero-sub"><i class="ti ti-map-pin"></i>'+d.venue+' · '+d.region+'</div></div></div>';
  }).join('');
  dt.innerHTML=items.map(function(_,i){return '<div class="dot'+(i===0?' active':'')+'" onclick="goH('+i+')"></div>';}).join('');
  hTimer=setInterval(function(){goH((hCur+1)%hLen);},3600);
}

function goH(i){
  hCur=i;
  document.getElementById('heroTrack').style.transform='translateX(-'+i*100+'%)';
  document.querySelectorAll('.dot').forEach(function(d,j){d.classList.toggle('active',j===i);});
}

var tx=0;
document.getElementById('heroWrap').addEventListener('touchstart',function(e){tx=e.touches[0].clientX;},{passive:true});
document.getElementById('heroWrap').addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)<40) return;
  goH(dx<0?Math.min(hCur+1,hLen-1):Math.max(hCur-1,0));
},{passive:true});

function renderCards(){
  var g=document.getElementById('cardGrid');
  var w=document.getElementById('moreWrap');
  if(!filtered.length){
    g.innerHTML='<div class="state-box"><i class="ti ti-calendar-off"></i><span>해당 조건의 행사가 없습니다</span></div>';
    w.innerHTML='<div class="spacer"></div>';
    return;
  }
  g.innerHTML=filtered.slice(0,showN).map(function(d,i){
    var bg=d.thumb?"url('"+d.thumb+"') center/cover no-repeat":grad(d.cat);
    var isFav=favSet[d.title];
    var heartSvg=isFav
      ?'<svg width="16" height="16" viewBox="0 0 24 24" fill="#fff" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>'
      :'<svg width="16" height="16" viewBox="0 0 24 24" fill="rgba(0,0,0,0.15)" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>';
    return '<div class="card" onclick="openDetail('+i+')">'
      +'<div class="card-thumb"><div class="card-thumb-inner" style="background:'+bg+'"></div>'
      +'<div class="card-fav" onclick="toggleFav('+i+',event)">'+heartSvg+'</div></div>'
      +'<div class="card-body"><div class="card-cat">'+d.cat+'</div><div class="card-title">'+d.title+'</div>'
      +'<div class="card-venue"><i class="ti ti-map-pin"></i>'+d.venue+'</div>'
      +'<div class="card-date">'+fmtDate(d.start,d.end)+'</div></div></div>';
  }).join('');
  w.innerHTML=filtered.length>showN
    ?'<div class="load-more" onclick="loadMore()">더 보기 ('+(filtered.length-showN)+'개)</div><div class="spacer"></div>'
    :'<div class="spacer"></div>';
}

var favSet = {};

function toggleFav(i, e) {
  e.stopPropagation();
  var d = filtered[i];
  if (!d) return;
  var key = d.title;
  var isFavTab = document.querySelector('.nav-item:nth-child(2)').classList.contains('active');
  if (isFavTab && favSet[key]) {
    // 즐겨찾기 탭에서 해제 시 애니메이션 후 제거
    var card = e.currentTarget.closest('.card');
    card.style.transition = 'opacity .18s, transform .18s';
    card.style.opacity = '0';
    card.style.transform = 'scale(0.9)';
    setTimeout(function() {
      favSet[key] = false;
      var favItems = RAW.filter(function(d){ return favSet[d.title]; });
      filtered = favItems;
      document.getElementById('secCount').textContent = favItems.length ? favItems.length+'개의 행사' : '';
      renderCards();
    }, 180);
  } else {
    favSet[key] = !favSet[key];
    renderCards();
  }
}

function openDetail(i){
  var d=filtered[i];
  if(!d) return;
  var bg=d.thumb?"url('"+d.thumb+"') center/cover no-repeat":grad(d.cat);
  document.getElementById('detailBg').style.background=bg;
  document.getElementById('detailCat').textContent=d.cat;
  document.getElementById('detailTitle').textContent=d.title;
  var ic={
    cal:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
    pin:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8.686 2 6 4.686 6 8c0 5.25 6 13 6 13s6-7.75 6-13c0-3.314-2.686-6-6-6z"/><circle cx="12" cy="8" r="2"/></svg>',
    usr:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="3"/><path d="M3 20c0-3.314 2.686-6 6-6s6 2.686 6 6"/><circle cx="17" cy="7" r="3"/><path d="M21 20c0-3.314-1.343-6-4-6"/></svg>',
    tkt:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v1a2 2 0 0 0 0 4v1a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-1a2 2 0 0 0 0-4V9z"/><line x1="9" y1="7" x2="9" y2="17" stroke-dasharray="2 2"/></svg>',
    bld:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="1"/><path d="M9 21V9h6v12"/><rect x="7" y="3" width="10" height="6"/></svg>'
  };
  var rows=[
    {s:ic.cal,l:'기간',v:fmtDate(d.start,d.end)},
    {s:ic.pin,l:'장소',v:d.venue+(d.region?' ('+d.region+')':'')},
    {s:ic.usr,l:'관람 대상',v:d.target||'누구나'},
    {s:ic.tkt,l:'관람료',v:d.fee||'정보 없음'},
    {s:ic.bld,l:'주최',v:d.org||'정보 없음'}
  ];
  var html=rows.map(function(r){
    return '<div class="info-row"><div class="info-icon">'+r.s+'</div><div><div class="info-label">'+r.l+'</div><div class="info-value">'+r.v+'</div></div></div>';
  }).join('<div class="info-divider"></div>');
  if(d.link) html+='<a class="ext-link" href="'+d.link+'" target="_blank"><i class="ti ti-external-link"></i>공식 페이지 보기</a>';
  document.getElementById('detailBody').innerHTML=html;
  document.getElementById('pageDetail').classList.remove('slide-right');
  document.getElementById('pageHome').classList.add('slide-left');
}

function goHome(){
  document.getElementById('pageDetail').classList.add('slide-right');
  document.getElementById('pageHome').classList.remove('slide-left');
}

function openSearch(){
  document.getElementById('searchModal').classList.add('show');
  setTimeout(function(){document.getElementById('searchInp').focus();},100);
}
function closeSearch(){document.getElementById('searchModal').classList.remove('show');}
function modalBg(e){if(e.target===document.getElementById('searchModal'))closeSearch();}
function searchTyping(){
  var v=document.getElementById('searchInp').value;
  document.getElementById('searchX').classList.toggle('show',v.length>0);
}
function searchKey(e){if(e.key==='Enter')doSearch();}
function clearInp(){
  document.getElementById('searchInp').value='';
  document.getElementById('searchX').classList.remove('show');
  document.getElementById('searchInp').focus();
}
function doSearch(){
  F.kw=document.getElementById('searchInp').value.trim();
  closeSearch();
  render();
}
function clearKeyword(){
  F.kw='';
  document.getElementById('searchInp').value='';
  render();
}

function toggleDD(id,btn){
  var dd=document.getElementById(id);
  var open=dd.classList.contains('show');
  closeAll();
  if(!open){dd.classList.add('show');document.getElementById(btn).classList.add('active');}
}
function closeAll(){
  document.querySelectorAll('.dropdown').forEach(function(d){d.classList.remove('show');});
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
}
function pick(ddId,btnId,label,val,el){
  document.getElementById(ddId).querySelectorAll('.dd-item').forEach(function(i){i.classList.remove('sel');});
  el.classList.add('sel');
  document.querySelector('#'+btnId+' .lbl').textContent=label;
  if(ddId==='dd-cat') F.cat=val;
  else if(ddId==='dd-reg') F.region=val;
  else if(ddId==='dd-date') F.date=val;
  else if(ddId==='dd-sort') F.sort=val;
  closeAll();
  render();
}

document.addEventListener('click',function(e){if(!e.target.closest('#filterBar'))closeAll();});
function loadMore(){showN+=10;renderCards();}

function setNav(el){
  var idx=Array.from(document.querySelectorAll('.nav-item')).indexOf(el);
  document.querySelectorAll('.nav-item').forEach(function(x){x.classList.remove('active');});
  el.classList.add('active');
  if(idx===1){
    // 즐겨찾기 탭
    var favItems=RAW.filter(function(d){return favSet[d.title];});
    document.getElementById('secTitle').textContent='즐겨찾기';
    document.getElementById('secCount').textContent=favItems.length?favItems.length+'개의 행사':'';
    document.getElementById('searchClose').style.display='none';
    filtered=favItems;
    showN=10;
    renderHero(filtered.slice(0,4));
    renderCards();
  } else {
    render();
  }
}

init();
</script>
</body>
</html>
